<!DOCTYPE html>
<html>
<head>
<title>Image Forensic Analyzer</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: "Georgia", serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:25px;
    color:#2c3e50;
    font-size:28px;
}

input[type=file]{
    padding:10px;
    margin:15px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2c5364;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#203a43;
}

.back{
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#2c5364;
    font-weight:bold;
}

.back a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h1>Upload Image for Forensic Analysis</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br>

<button type="submit">Analyze Image</button>

</form>

<div class="back">
<a href="/dashboard">Back to Home</a>
</div>

</div>

</body>
</html>
