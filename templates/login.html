<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hybrid Forensic Analyzer - Login</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: "Georgia", serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-card{
    width:420px;
    padding:40px;
    border-radius:12px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    text-align:center;
    color:white;
}

.title{
    font-size:30px;
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    margin-bottom:25px;
    color:#dddddd;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4e5f;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#163742;
}

.register{
    margin-top:20px;
}

.register a{
    color:#9bd1ff;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-card">

<div class="title">Hybrid Forensic Analyzer</div>
<div class="subtitle">Secure Digital Investigation Platform</div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register">
New user? <a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
